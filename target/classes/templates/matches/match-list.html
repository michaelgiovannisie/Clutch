<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matches — FIFA World Cup 2026™</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange:#FF6B35; --pink:#E8407A; --dark:#2D1200; --white:#FFFFFF; --radius:14px; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #FF6B35 0%, #FF9A5C 30%, #E8407A 70%, #C0306A 100%);
      min-height: 100vh; color: var(--dark);
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 28px; background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
      border-bottom: 1.5px solid rgba(255,255,255,0.35); position: sticky; top: 0; z-index: 999;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.6); background: rgba(255,255,255,0.18); color: var(--white);
      font-size: 13px; font-weight: 700; text-decoration: none; transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.32); }
    .header-title { font-size: 14px; font-weight: 800; color: var(--white); letter-spacing: 1px; text-transform: uppercase; }
    .page { max-width: 900px; margin: 0 auto; padding: 32px 40px 60px; }
    .page-title { font-size: 26px; font-weight: 800; color: var(--white); margin-bottom: 20px; text-shadow: 0 1px 6px rgba(0,0,0,0.2); }
    .card { background: var(--white); border-radius: var(--radius); padding: 8px 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
    .match-row {
      display: flex; align-items: center; justify-content: space-between; padding: 14px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06); text-decoration: none; color: var(--dark);
    }
    .match-row:last-child { border-bottom: none; }
    .match-teams { font-weight: 700; font-size: 14px; }
    .match-meta { font-size: 11px; color: #999; margin-top: 2px; }
    .match-score { font-weight: 800; font-size: 15px; color: var(--orange); white-space: nowrap; }
    .match-status { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: #999; text-align: right; }
    .empty { color: var(--white); font-size: 14px; text-align: center; padding: 60px 0; opacity: 0.9; }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <a class="back-btn" href="/venues">← Venues</a>
    <span class="header-title">FIFA World Cup 2026™</span>
  </div>
</header>
<div class="page">
  <div class="page-title">Matches</div>
  <div class="card" th:if="${matches != null and !matches.isEmpty()}">
    <a class="match-row" th:each="match : ${matches}" th:href="@{/matches/{id}(id=${match.id})}">
      <div>
        <div class="match-teams"
             th:text="${(match.homeTeam != null ? match.homeTeam.name : 'TBD') + ' vs ' + (match.awayTeam != null ? match.awayTeam.name : 'TBD')}"></div>
        <div class="match-meta"
             th:text="${(match.stage != null ? #strings.replace(match.stage,'_',' ') : '') + (match.groupName != null ? ' · Group ' + match.groupName : '')}"></div>
      </div>
      <div>
        <div class="match-score"
             th:text="${match.status == 'FINISHED' and match.homeScore != null ? (match.homeScore + ' – ' + match.awayScore) : '—'}"></div>
        <div class="match-status" th:text="${match.status}"></div>
      </div>
    </a>
  </div>
  <div class="empty" th:if="${matches == null or matches.isEmpty()}">
    No fixtures synced yet. Trigger a sync via POST /api/sync/football-data.
  </div>
</div>
</body>
</html>
