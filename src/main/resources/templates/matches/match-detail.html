<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Match — FIFA World Cup 2026™</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange:#FF6B35; --pink:#E8407A; --dark:#2D1200; --white:#FFFFFF; --radius:14px; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #FF6B35 0%, #FF9A5C 30%, #E8407A 70%, #C0306A 100%);
      min-height: 100vh; color: var(--dark);
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 28px; background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
      border-bottom: 1.5px solid rgba(255,255,255,0.35); position: sticky; top: 0; z-index: 999;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.6); background: rgba(255,255,255,0.18); color: var(--white);
      font-size: 13px; font-weight: 700; text-decoration: none; transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.32); }
    .header-title { font-size: 14px; font-weight: 800; color: var(--white); letter-spacing: 1px; text-transform: uppercase; }
    .page { max-width: 700px; margin: 0 auto; padding: 32px 40px 60px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 28px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
    .matchup { display: flex; align-items: center; justify-content: center; gap: 28px; }
    .team-col { text-align: center; }
    .team-flag { font-size: 48px; }
    .team-name { font-weight: 800; font-size: 16px; margin-top: 6px; }
    .score { font-size: 32px; font-weight: 800; color: var(--orange); }
    .vs { font-size: 13px; color: #999; font-weight: 700; }
    .meta-row { display: flex; justify-content: center; gap: 18px; margin-top: 22px; font-size: 12px; color: #888; flex-wrap: wrap; }
    .meta-pill {
      background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.2);
      border-radius: 20px; padding: 5px 14px; color: var(--dark); font-weight: 600;
    }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <a class="back-btn" href="/matches">← Matches</a>
    <span class="header-title">FIFA World Cup 2026™</span>
  </div>
</header>
<div class="page">
  <div class="card">
    <div class="matchup">
      <div class="team-col">
        <div class="team-flag" th:text="${match.homeTeam != null ? (match.homeTeam.flag ?: '🏳️') : '🏳️'}"></div>
        <div class="team-name" th:text="${match.homeTeam != null ? match.homeTeam.name : 'TBD'}"></div>
      </div>
      <div class="score" th:if="${match.status == 'FINISHED' and match.homeScore != null}"
           th:text="${match.homeScore + ' – ' + match.awayScore}"></div>
      <div class="vs" th:unless="${match.status == 'FINISHED' and match.homeScore != null}">VS</div>
      <div class="team-col">
        <div class="team-flag" th:text="${match.awayTeam != null ? (match.awayTeam.flag ?: '🏳️') : '🏳️'}"></div>
        <div class="team-name" th:text="${match.awayTeam != null ? match.awayTeam.name : 'TBD'}"></div>
      </div>
    </div>
    <div class="meta-row">
      <span class="meta-pill" th:if="${match.stage != null}" th:text="${#strings.replace(match.stage,'_',' ')}"></span>
      <span class="meta-pill" th:if="${match.groupName != null}" th:text="'Group ' + ${match.groupName}"></span>
      <span class="meta-pill" th:if="${match.venue != null}" th:text="${match.venue.name}"></span>
      <span class="meta-pill" th:text="${match.status}"></span>
    </div>
  </div>
</div>
</body>
</html>
