<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Standings — FIFA World Cup 2026™</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange:#FF6B35; --pink:#E8407A; --dark:#2D1200; --white:#FFFFFF; --radius:14px; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #FF6B35 0%, #FF9A5C 30%, #E8407A 70%, #C0306A 100%);
      min-height: 100vh; color: var(--dark);
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 28px; background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
      border-bottom: 1.5px solid rgba(255,255,255,0.35); position: sticky; top: 0; z-index: 999;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.6); background: rgba(255,255,255,0.18); color: var(--white);
      font-size: 13px; font-weight: 700; text-decoration: none; transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.32); }
    .header-title { font-size: 14px; font-weight: 800; color: var(--white); letter-spacing: 1px; text-transform: uppercase; }
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 40px 60px; }
    .page-title { font-size: 26px; font-weight: 800; color: var(--white); margin-bottom: 20px; text-shadow: 0 1px 6px rgba(0,0,0,0.2); }
    .groups-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 18px 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
    .group-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: #999; margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    th { text-align: left; color: #aaa; font-weight: 700; padding: 4px 6px; text-transform: uppercase; font-size: 10.5px; }
    th.num, td.num { text-align: center; }
    td { padding: 7px 6px; border-top: 1px solid rgba(0,0,0,0.06); }
    .team-cell { display: flex; align-items: center; gap: 8px; font-weight: 700; }
    .team-cell img { width: 20px; height: 14px; object-fit: cover; border-radius: 2px; }
    td.pts { font-weight: 800; color: var(--orange); }
    .empty { color: var(--white); font-size: 14px; text-align: center; padding: 60px 0; opacity: 0.9; }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <a class="back-btn" href="/teams">← Teams</a>
    <span class="header-title">FIFA World Cup 2026™</span>
  </div>
</header>
<div class="page">
  <div class="page-title">Group Standings</div>

  <div class="groups-grid" th:if="${standingsByGroup != null and !standingsByGroup.isEmpty()}">
    <div class="card" th:each="entry : ${standingsByGroup}">
      <div class="group-title" th:text="'Group ' + ${entry.key}"></div>
      <table>
        <thead>
          <tr>
            <th>Team</th>
            <th class="num">P</th>
            <th class="num">W</th>
            <th class="num">D</th>
            <th class="num">L</th>
            <th class="num">GF</th>
            <th class="num">GA</th>
            <th class="num">GD</th>
            <th class="num">Pts</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="row : ${entry.value}">
            <td>
              <a class="team-cell" th:href="@{/teams/{id}(id=${row.team.id})}" style="text-decoration:none; color:inherit;">
                <img th:if="${row.team.flag}" th:src="${row.team.flag}" alt=""/>
                <span th:text="${row.team.name}"></span>
              </a>
            </td>
            <td class="num" th:text="${row.played}"></td>
            <td class="num" th:text="${row.won}"></td>
            <td class="num" th:text="${row.drawn}"></td>
            <td class="num" th:text="${row.lost}"></td>
            <td class="num" th:text="${row.goalsFor}"></td>
            <td class="num" th:text="${row.goalsAgainst}"></td>
            <td class="num" th:text="${row.goalDifference}"></td>
            <td class="num pts" th:text="${row.points}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="empty" th:if="${standingsByGroup == null or standingsByGroup.isEmpty()}">
    No groups assigned yet. Trigger a sync via POST /api/sync/football-data.
  </div>
</div>
</body>
</html>
